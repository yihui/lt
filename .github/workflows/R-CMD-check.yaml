on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

name: R-CMD-check

jobs:
  R-CMD-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@HEAD
      - uses: r-lib/actions/setup-r@HEAD
      - uses: yihui/actions/setup-r-dependencies@HEAD
      - uses: yihui/actions/check-r-package@HEAD
