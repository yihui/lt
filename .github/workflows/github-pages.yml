name: Build and deploy package site

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: read
      statuses: write
    steps:
      - uses: actions/checkout@HEAD

      - if: github.event_name != 'pull_request'
        uses: actions/configure-pages@HEAD
        with:
          enablement: true

      - uses: r-lib/actions/setup-r@HEAD
        with:
          use-public-rspm: true
      - uses: yihui/actions/setup-r-dependencies@HEAD
        with:
          extra-packages: litedown xfun gsDesign2 .
          r-universe: yihui
      - uses: yihui/actions/litedown-site@HEAD
        with:
          site-dir: 'site'

      - if: github.event_name == 'pull_request'
        id: upload
        uses: actions/upload-artifact@HEAD
        with:
          name: site-preview
          path: 'site'

      - if: github.event_name == 'pull_request'
        uses: actions/github-script@HEAD
        with:
          script: |
            const runUrl = `${{ steps.upload.outputs.artifact-url }}`;
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.payload.pull_request.head.sha,
              state: 'success',
              target_url: runUrl,
              description: 'Site preview artifact ready',
              context: 'Site preview'
            });

      - if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@HEAD
        with:
          path: 'site'

  deploy:
    needs: build
    if: github.event_name != 'pull_request'
    runs-on: macos-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
    steps:
      - id: deployment
        uses: actions/deploy-pages@HEAD
